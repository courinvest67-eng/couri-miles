async function fetchEuroRate() {
  const dateEl = document.getElementById('f-date');
  const rateEl = document.getElementById('f-euro-rate');
  const statusEl = document.getElementById('euro-rate-status');
  const btnEl = document.getElementById('btn-fetch-euro');
  if(!rateEl||!statusEl) return;

  const date = dateEl?.value || new Date().toISOString().split('T')[0];

  btnEl.textContent = '...';
  statusEl.textContent = 'Buscando cotação...';
  statusEl.style.color = '#3b82f6';

  try {
    // Try BCB API (Banco Central do Brasil) - EUR/BRL ptax
    const dateFormatted = date.split('-').reverse().join('/'); // DD/MM/YYYY
    const startDate = date.replace(/-/g,'');
    
    // Try fetching from exchangerate API (more reliable for CORS)
    const resp = await fetch(`https://api.exchangerate.host/convert?from=EUR&to=BRL&date=${date}&amount=1`);
    if(resp.ok) {
      const data = await resp.json();
      if(data.result) {
        rateEl.value = data.result.toFixed(4);
        statusEl.textContent = `✓ Cotação EUR/BRL em ${date}: R$ ${data.result.toFixed(4)}`;
        statusEl.style.color = '#10b981';
        btnEl.textContent = 'Buscar €';
        updateEuroAnalysis();
        return;
      }
    }
  } catch(e) {}

  try {
    // Fallback: AwesomeAPI
    const resp2 = await fetch(`https://economia.awesomeapi.com.br/json/daily/EUR-BRL/?start_date=${date.replace(/-/g,'')}&end_date=${date.replace(/-/g,'')}`);
    if(resp2.ok) {
      const data2 = await resp2.json();
      if(data2.length>0) {
        const rate = parseFloat(data2[0].bid);
        rateEl.value = rate.toFixed(4);
        statusEl.textContent = `✓ Cotação EUR/BRL em ${date}: R$ ${rate.toFixed(4)} (AwesomeAPI)`;
        statusEl.style.color = '#10b981';
        btnEl.textContent = 'Buscar €';
        updateEuroAnalysis();
        return;
      }
    }
  } catch(e) {}

  try {
    // Fallback 2: latest rate
    const resp3 = await fetch('https://economia.awesomeapi.com.br/last/EUR-BRL');
    if(resp3.ok) {
      const data3 = await resp3.json();
      if(data3.EURBRL) {
        const rate = parseFloat(data3.EURBRL.bid);
        rateEl.value = rate.toFixed(4);
        statusEl.textContent = `✓ Cotação atual EUR/BRL: R$ ${rate.toFixed(4)} (última disponível)`;
        statusEl.style.color = '#f59e0b';
        btnEl.textContent = 'Buscar €';
        updateEuroAnalysis();
        return;
      }
    }
  } catch(e) {}

  statusEl.textContent = '⚠ Não foi possível buscar. Insira manualmente.';
  statusEl.style.color = '#ef4444';
  btnEl.textContent = 'Buscar €';
}

function updateEuroAnalysis() {
  const section = document.getElementById('accor-euro-section');
  if(!section || section.style.display==='none') return;

  const miles = parseInt(document.getElementById('f-miles')?.value)||0;
  const euroRateEl = document.getElementById('f-euro-rate');
  const euroRate = parseFloat(euroRateEl?.value)||0;
  const euroValueEl = document.getElementById('f-euro-value');
  const costPerEuroEl = document.getElementById('f-cost-per-euro');
  const euroSavingsEl = document.getElementById('f-euro-savings');
  const euroDetailEl = document.getElementById('euro-detail');

  // ALL Accor: 1000 pts = €20 voucher → pts/€ = 50 pts per €1
  const mv = getMarketVal('allaccor');
  const euroPerK = mv.currency==='EUR' ? mv.perK : 20; // fallback €20/K
  const eurosFromMiles = (miles / 1000) * euroPerK;

  if(euroValueEl) euroValueEl.textContent = miles>0 ? `€ ${eurosFromMiles.toFixed(2)}` : '—';

  // Calculate cost per euro based on user's avg accumulation cost for allaccor (incl. transfers)
  const acqAccor = getProgAcquisition('allaccor');
  const avgCostPerMile = acqAccor.avgCostPerMile;
  const costInBRL = avgCostPerMile * miles;
  const costPerEuro = eurosFromMiles>0&&costInBRL>0 ? costInBRL/eurosFromMiles : 0;

  if(costPerEuroEl) {
    if(costPerEuro>0) {
      costPerEuroEl.value = costPerEuro.toFixed(2);
    } else {
      costPerEuroEl.value = '';
      costPerEuroEl.placeholder = miles>0 ? '0 (grátis)' : '0.00';
    }
  }

  updateEuroSavings();
}

function updateEuroSavings() {
  const miles = parseInt(document.getElementById('f-miles')?.value)||0;
  const euroRate = parseFloat(document.getElementById('f-euro-rate')?.value)||0;
  const costPerEuro = parseFloat(document.getElementById('f-cost-per-euro')?.value)||0;
  const euroSavingsEl = document.getElementById('f-euro-savings');
  const euroDetailEl = document.getElementById('euro-detail');

  const mv = getMarketVal('allaccor');
  const euroPerK = mv.currency==='EUR' ? mv.perK : 20;
  const eurosFromMiles = (miles / 1000) * euroPerK;

  // Compare cost per euro vs market rate
  if(euroSavingsEl) {
    if(euroRate>0 && miles>0) {
      if(costPerEuro>0) {
        const savings = euroRate - costPerEuro;
        const savingsPct = (savings/euroRate)*100;
        const totalSavings = eurosFromMiles * savings;
        euroSavingsEl.textContent = savings>=0 ? `${fCur(totalSavings)} (${savingsPct.toFixed(0)}%)` : `${fCur(totalSavings)}`;
        euroSavingsEl.style.color = savings>=0 ? '#10b981' : '#ef4444';
      } else {
        const marketCostBRL = eurosFromMiles * euroRate;
        euroSavingsEl.textContent = `${fCur(marketCostBRL)} (100%)`;
        euroSavingsEl.style.color = '#10b981';
      }
    } else {
      euroSavingsEl.textContent = '—';
      euroSavingsEl.style.color = 'var(--text-dim)';
    }
  }

  if(euroDetailEl && miles>0 && euroRate>0) {
    euroDetailEl.innerHTML = `
      ${fMiles(miles)} pts = € ${eurosFromMiles.toFixed(2)} em voucher Accor<br>
      ${costPerEuro>0?`Seu custo: R$ ${costPerEuro.toFixed(2)}/€ vs Cotação: R$ ${euroRate.toFixed(2)}/€`:`Custo zero (pts acumulados sem gasto)`}
      ${costPerEuro>0&&costPerEuro<euroRate?`<br><strong style="color:#10b981">Você paga ${((costPerEuro/euroRate)*100).toFixed(0)}% do valor de mercado do euro!</strong>`:''}
    `;
  } else if(euroDetailEl) {
    euroDetailEl.innerHTML = '';
  }
}

function submitTransfer() {
  const miles=parseInt(document.getElementById('f-miles').value)||0;
  if(!miles) return;
  const fromId=document.getElementById('f-program-from').value;
  const toId=document.getElementById('f-program-to').value;
  const date=document.getElementById('f-date').value;
  const desc=document.getElementById('f-desc').value;
  const totalMiles=getTransferDestMiles();
  const fromBal=state.balances[fromId]||0;

  if(totalMiles<=0) { alert('Preencha os dados de conversão corretamente.'); return; }
  if(fromId===toId) { alert('Origem e destino devem ser diferentes.'); return; }
  if(miles>fromBal) { alert(`Saldo insuficiente em ${PROGRAMS.find(p=>p.id===fromId).name}. Disponível: ${fMiles(fromBal)} milhas.`); return; }

  const fromProg=PROGRAMS.find(p=>p.id===fromId);
  const toProg=PROGRAMS.find(p=>p.id===toId);
  const parFrom=parseFloat(document.getElementById('f-parity-from').value)||1000;
  const parTo=parseFloat(document.getElementById('f-parity-to').value)||1000;
  const bonus=parseFloat(document.getElementById('f-bonus').value)||0;
  const boomerang=parseFloat(document.getElementById('f-boomerang').value)||0;
  const boomerangMiles=Math.round(miles*boomerang/100);
  const isParity = !(parFrom===parTo);

  // Calculate acquisition cost from origin program
  const fromTxs = state.transactions.filter(t=>t.program===fromId&&(t.type==='compra'||(t.type==='transferencia'&&t.description.startsWith('↙'))));
  const fromTotalSpent = fromTxs.reduce((a,t)=>a+t.cost,0);
  const fromTotalMiles = fromTxs.reduce((a,t)=>a+t.miles,0);
  const fromAvgCostPerMile = fromTotalMiles>0 ? fromTotalSpent/fromTotalMiles : 0;
  const transferredCost = parseFloat((fromAvgCostPerMile * miles).toFixed(2));
  const transferredCostPerK = totalMiles>0 ? (transferredCost/totalMiles)*1000 : 0;

  let convParts = [];
  if(isParity) convParts.push(`paridade ${fMiles(parFrom)}:${fMiles(parTo)}`);
  if(bonus>0) convParts.push(`bônus ${bonus}%`);
  if(boomerang>0) convParts.push(`bumerangue ${boomerang}%`);
  const convInfo = convParts.length>0 ? ` (${convParts.join(' + ')})` : '';
  const costInfo = transferredCost>0 ? ` [custo: ${fCur(transferredCost)}]` : '';
  const description = desc || `${fromProg.name} → ${toProg.name}${convInfo}`;

  // Create transactions
  const txOut = {
    id: Date.now(),
    date,
    program: fromId,
    type: 'transferencia',
    miles,
    cost: 0, savedValue: 0,
    description: `↗ Saída: ${description}${costInfo}`,
    costPerK: 0,
    transferTo: toId,
    transferMode,
    transferLinkedMiles: totalMiles,
    transferredCost,
  };
  const txIn = {
    id: Date.now()+1,
    date,
    program: toId,
    type: 'transferencia',
    miles: totalMiles,
    cost: transferredCost,
    savedValue: 0,
    description: `↙ Entrada: ${description}${costInfo}`,
    costPerK: transferredCostPerK,
    transferFrom: fromId,
    transferMode,
    transferLinkedMiles: miles,
    transferredCost,
  };

  state.transactions.unshift(txIn);
  state.transactions.unshift(txOut);

  // Boomerang transaction (return to origin)
  if(boomerangMiles > 0) {
    const txBoomerang = {
      id: Date.now()+2,
      date,
      program: fromId,
      type: 'transferencia',
      miles: boomerangMiles,
      cost: 0, savedValue: 0,
      description: `↩ Bumerangue: ${description}`,
      costPerK: 0,
      transferFrom: fromId,
      isBoomerang: true,
    };
    state.transactions.unshift(txBoomerang);
  }

  state.balances[fromId] = Math.max(0, fromBal - miles + boomerangMiles);
  state.balances[toId] = (state.balances[toId]||0) + totalMiles;

  saveState(); closeModal(); render();
}

function submitForm() {
  const miles=parseInt(document.getElementById('f-miles').value)||0;
  if(!miles) return;
  const cost=parseFloat(document.getElementById('f-cost').value)||0;
  const program=document.getElementById('f-program').value;

  // Calculate profit for venda
  let saleProfit = 0;
  let acquisitionCost = 0;
  if(formType==='venda') {
    const acq = getProgAcquisition(program);
    acquisitionCost = acq.avgCostPerMile * miles;
    saleProfit = cost - acquisitionCost;
  }

  const tx = {
    id: Date.now(),
    date: document.getElementById('f-date').value,
    program,
    type: formType,
    miles,
    cost: formType==='uso'?0:cost,
    savedValue: formType==='uso'?cost:0,
    description: document.getElementById('f-desc').value || TYPE_LABELS[formType],
    costPerK: miles>0&&cost>0?(cost/miles)*1000:0,
  };

  // Store extra data for venda
  if(formType==='venda') {
    tx.acquisitionCost = acquisitionCost;
    tx.saleProfit = saleProfit;
  }

  // Store uso type and cost
  if(formType==='uso') {
    const usoType = document.getElementById('f-uso-type')?.value;
    if(usoType) tx.usoType = usoType;
    const acqUso = getProgAcquisition(program);
    tx.usoCostTotal = parseFloat((acqUso.avgCostPerMile * miles).toFixed(2));
    tx.usoCostPerK = acqUso.avgCostPerK;
    // If savedValue is 0 but we have cost data, auto-fill with miles cost
    if(tx.savedValue===0 && tx.usoCostTotal>0) {
      tx.savedValue = tx.usoCostTotal;
    }
  }

  state.transactions.unshift(tx);
  if(formType==='compra') state.balances[program]=(state.balances[program]||0)+miles;
  if(formType==='venda'||formType==='uso') state.balances[program]=Math.max(0,(state.balances[program]||0)-miles);
  saveState(); closeModal(); render();
}

function deleteTx(id) {
  if(!confirm('Excluir esta movimentação? O saldo será recalculado.')) return;
  state.transactions = state.transactions.filter(t=>t.id!==id);
  recalcBalances();
  saveState(); render();
}

function recalcBalances() {
  const bals = {}; PROGRAMS.forEach(p=>bals[p.id]=0);
  const sorted = [...state.transactions].sort((a,b)=>new Date(a.date)-new Date(b.date));
  sorted.forEach(tx => {
    if(tx.type==='compra') bals[tx.program]=(bals[tx.program]||0)+tx.miles;
    else if(tx.type==='venda'||tx.type==='uso') bals[tx.program]=Math.max(0,(bals[tx.program]||0)-tx.miles);
    else if(tx.type==='transferencia') {
      if(tx.description.startsWith('↗')) bals[tx.program]=Math.max(0,(bals[tx.program]||0)-tx.miles);
      else if(tx.description.startsWith('↙')) bals[tx.program]=(bals[tx.program]||0)+tx.miles;
      else if(tx.description.startsWith('↩')) bals[tx.program]=(bals[tx.program]||0)+tx.miles;
    }
  });
  state.balances = bals;
}

function saveEdit() {
  if(!editingTxId) return;
  const tx = state.transactions.find(t=>t.id===editingTxId);
  if(!tx) return;

  tx.type = editingType;
  tx.program = document.getElementById('f-edit-program').value;
  tx.date = document.getElementById('f-edit-date').value;
  tx.miles = parseInt(document.getElementById('f-edit-miles').value)||tx.miles;
  tx.description = document.getElementById('f-edit-desc').value||tx.description;

  const costEl = document.getElementById('f-edit-cost');
  if(costEl) {
    const costVal = parseFloat(costEl.value)||0;
    if(editingType==='uso') { tx.savedValue=costVal; tx.cost=0; }
    else { tx.cost=costVal; tx.savedValue=0; }
    tx.costPerK = tx.miles>0&&costVal>0?(costVal/tx.miles)*1000:0;
  }

  recalcBalances();
  editingTxId=null;
  saveState(); closeModal(); render();
}

let importedRows = [];
let importProgram = 'livelo';

async function handleImportFile(event) {
  const file = event.target.files[0];
  if(!file) return;
  event.target.value = '';

  const ext = file.name.split('.').pop().toLowerCase();
  let rawRows = [];

  try {
    if(ext==='csv') {
      const text = await file.text();
      rawRows = parseCSVText(text);
    } else if(ext==='xlsx'||ext==='xls') {
      const data = await file.arrayBuffer();
      rawRows = parseExcelData(data);
    } else if(ext==='pdf') {
      rawRows = await parsePDFFile(file);
    } else {
      alert('Formato não suportado. Use PDF, Excel ou CSV.');
      return;
    }
  } catch(e) {
    console.error('Import error:', e);
    alert('Erro ao ler arquivo: '+e.message);
    return;
  }

  if(rawRows.length===0) {
    alert('Nenhum dado encontrado no arquivo.');
    return;
  }

  importedRows = rawRows;
  showImportPreview(file.name);
}

function parseCSVText(text) {
  const lines = text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2) return [];
  const rows = [];
  for(let i=1;i<lines.length;i++) {
    const cols = lines[i].split(/[;,\t]/).map(c=>c.trim().replace(/^"|"$/g,''));
    if(cols.length>=2) {
      rows.push({ raw: cols, date: extractDate(cols), miles: extractNumber(cols), value: extractValue(cols), desc: extractDesc(cols), type: guessType(cols) });
    }
  }
  return rows;
}

function parseExcelData(data) {
  const wb = XLSX.read(data, {type:'array', cellDates:true});
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
  if(json.length<2) return [];
  const rows = [];
  for(let i=1;i<json.length;i++) {
    const cols = json[i].map(c=>String(c).trim());
    if(cols.some(c=>c)) {
      rows.push({ raw: cols, date: extractDate(cols), miles: extractNumber(cols), value: extractValue(cols), desc: extractDesc(cols), type: guessType(cols) });
    }
  }
  return rows;
}

async function parsePDFFile(file) {
  if(!window.pdfjsLib) { alert('Biblioteca PDF não carregou. Tente recarregar a página.'); return []; }
  const data = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data}).promise;
  let allText = '';
  for(let i=1;i<=pdf.numPages;i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const lines = [];
    let lastY = null;
    content.items.forEach(item => {
      if(lastY!==null && Math.abs(item.transform[5]-lastY)>5) lines.push('\n');
      lines.push(item.str);
      lastY = item.transform[5];
    });
    allText += lines.join(' ')+'\n';
  }
  // Parse lines looking for patterns
  const textLines = allText.split('\n').filter(l=>l.trim());
  const rows = [];
  for(const line of textLines) {
    const dateMatch = line.match(/(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})/);
    const numMatch = line.match(/(\d[\d\.]*\d)/g);
    if(dateMatch && numMatch) {
      const numbers = numMatch.map(n=>parseFloat(n.replace(/\./g,'').replace(',','.'))).filter(n=>n>0);
      const miles = numbers.find(n=>n>=100)||0;
      const value = numbers.find(n=>n>0&&n!==miles&&n<miles)||0;
      if(miles>0) {
        rows.push({ raw:[line], date:parseFlexDate(dateMatch[1]), miles:Math.round(miles), value, desc:line.substring(0,80).trim(), type:guessTypeFromText(line) });
      }
    }
  }
  return rows;
}

function extractDate(cols) {
  for(const c of cols) {
    const d = parseFlexDate(c);
    if(d) return d;
  }
  return new Date().toISOString().split('T')[0];
}

function parseFlexDate(str) {
  if(!str) return null;
  let m = String(str).match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m = String(str).match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);
  if(m) {
    const y = m[3].length===2?'20'+m[3]:m[3];
    return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  }
  if(str instanceof Date) return str.toISOString().split('T')[0];
  return null;
}

function extractNumber(cols) {
  const nums = cols.map(c=>parseFloat(String(c).replace(/\./g,'').replace(',','.'))).filter(n=>!isNaN(n)&&n>=100);
  return nums.length>0 ? Math.round(Math.max(...nums)) : 0;
}

function extractValue(cols) {
  const nums = cols.map(c=>{
    const clean = String(c).replace(/R\$\s*/,'').replace(/\./g,'').replace(',','.');
    return parseFloat(clean);
  }).filter(n=>!isNaN(n)&&n>0&&n<100000);
  return nums.length>0 ? nums[0] : 0;
}

function extractDesc(cols) {
  const text = cols.filter(c=>String(c).length>5&&isNaN(parseFloat(String(c).replace(/[\.\,]/g,'')))).join(' ');
  return text.substring(0,80)||'Importado';
}

function guessType(cols) {
  const text = cols.join(' ').toLowerCase();
  return guessTypeFromText(text);
}

function guessTypeFromText(text) {
  const t = text.toLowerCase();
  if(t.includes('venda')||t.includes('resgate dinheiro')||t.includes('cashback')) return 'venda';
  if(t.includes('emiss')||t.includes('passag')||t.includes('bilhete')||t.includes('voucher')||t.includes('hospedagem')) return 'uso';
  if(t.includes('transfer')||t.includes('conver')) return 'transferencia';
  if(t.includes('compra')||t.includes('acúmulo')||t.includes('acumulo')||t.includes('crédito')||t.includes('credito')||t.includes('bônus')||t.includes('bonus')||t.includes('clube')) return 'compra';
  return 'compra';
}

function toggleAllImport(checked) {
  importedRows.forEach((_,i)=>{
    const el=document.getElementById('imp-chk-'+i);
    if(el) el.checked=checked;
  });
}

function cancelImport() {
  importedRows=[];
  const area=document.getElementById('import-preview-area');
  if(area) area.innerHTML='';
}

function confirmImport() {
  const prog = document.getElementById('import-program')?.value || importProgram;
  let count=0;

  importedRows.forEach((r,i)=>{
    if(i>=20) {
      // Auto-import rows beyond preview
      addImportedTx(r, prog, r.type);
      count++;
      return;
    }
    const chk=document.getElementById('imp-chk-'+i);
    const typeEl=document.getElementById('imp-type-'+i);
    if(chk&&chk.checked) {
      const type = typeEl?typeEl.value:r.type;
      addImportedTx(r, prog, type);
      count++;
    }
  });

  recalcBalances();
  saveState();
  importedRows=[];
  const area=document.getElementById('import-preview-area');
  if(area) area.innerHTML=`<div class="card" style="border-left:3px solid #10b981;padding:12px"><span style="color:#10b981;font-weight:600">✓ ${count} movimentações importadas com sucesso!</span></div>`;
  setTimeout(()=>{ if(area) area.innerHTML=''; render(); }, 2500);
}

function addImportedTx(row, progId, type) {
  const tx = {
    id: Date.now()+Math.random()*10000,
    date: row.date||new Date().toISOString().split('T')[0],
    program: progId,
    type: type,
    miles: row.miles||0,
    cost: type==='uso'?0:(row.value||0),
    savedValue: type==='uso'?(row.value||0):0,
    description: row.desc||'Importado',
    costPerK: row.miles>0&&row.value>0?(row.value/row.miles)*1000:0,
    imported: true,
  };
  state.transactions.push(tx);
}

async function loadAdminUsers() {
  if(!useFirebase||!isAdmin()) return;
  adminLoading = true;
  render();

  try {
    const snapshot = await db.collection('users').get();
    adminUsers = [];
    snapshot.forEach(doc => {
      const data = doc.data();
      adminUsers.push({
        uid: doc.id,
        email: data._email || doc.id,
        displayName: data._displayName || '—',
        data: data,
      });
    });
    // Sort by total balance descending
    adminUsers.sort((a,b) => {
      const balA = a.data?.balances ? Object.values(a.data.balances).reduce((s,v)=>s+v,0) : 0;
      const balB = b.data?.balances ? Object.values(b.data.balances).reduce((s,v)=>s+v,0) : 0;
      return balB - balA;
    });
  } catch(e) {
    console.error('Admin load error:', e);
    adminUsers = [];
  }

  adminLoading = false;
  render();
}

  return next.toLocaleDateString('pt-BR');
}

          {label:'Clube TudoAzul',prog:'tudoazul',miles:10000,cost:49.90,desc:'Clube TudoAzul'},
          {label:'LATAM Pass',prog:'latampass',miles:1000,cost:31.30,desc:'Clube LATAM Pass'},

function fillRecurringPreset(prog,miles,cost,desc) {
  document.getElementById('f-rec-program').value = prog;
  document.getElementById('f-rec-miles').value = miles;
  document.getElementById('f-rec-cost').value = cost;
  document.getElementById('f-rec-desc').value = desc;
}

function saveRecurring() {
  const program = document.getElementById('f-rec-program').value;
  const day = parseInt(document.getElementById('f-rec-day').value)||15;
  const miles = parseInt(document.getElementById('f-rec-miles').value)||0;
  const cost = parseFloat(document.getElementById('f-rec-cost').value)||0;
  const startDate = document.getElementById('f-rec-start').value;
  const description = document.getElementById('f-rec-desc').value||'Recorrente';

  if(!miles) { alert('Informe a quantidade de milhas.'); return; }

  if(!state.recurring) state.recurring = [];
  state.recurring.push({
    program, day, miles, cost, description, startDate,
    active: true,
    lastProcessed: null,
  });
  saveState(); closeModal(); render();
}

function toggleRecurring(index) {
  if(!state.recurring||!state.recurring[index]) return;
  state.recurring[index].active = !state.recurring[index].active;
  saveState(); render();
}

  const r = state.recurring[index];

  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('hidden');

  const progOptions = PROGRAMS.map(p=>`<option value="${p.id}" ${p.id===r.program?'selected':''}>${p.name}</option>`).join('');

  document.getElementById('modal').innerHTML = `
    <div class="modal-header">
      <h3>✏️ Editar Recorrente</h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Programa</label>
      <select class="form-input" id="f-rec-program">${progOptions}</select>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Dia do Mês</label>
        <input type="number" class="form-input" id="f-rec-day" min="1" max="28" value="${r.day}">
      </div>
      <div class="form-group">
        <label class="form-label">Quantidade de Milhas</label>
        <input type="number" class="form-input" id="f-rec-miles" value="${r.miles}">
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Custo Mensal (R$)</label>
        <input type="number" class="form-input" id="f-rec-cost" value="${r.cost||0}">
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-input" id="f-rec-active">
          <option value="1" ${r.active?'selected':''}>Ativo</option>
          <option value="0" ${!r.active?'selected':''}>Pausado</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Descrição</label>
      <input type="text" class="form-input" id="f-rec-desc" value="${r.description}">
    </div>
    <div style="display:flex;gap:10px;margin-top:14px">
      <button onclick="saveEditRecurring(${index})" style="flex:1;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,#4f8fff,#6d4ed8);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif">Salvar</button>
      <button onclick="closeModal();deleteRecurring(${index})" style="padding:10px 14px;border-radius:10px;border:1px solid #7f1d1d44;background:#06091a;color:#f0465a;font-size:13px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif">Excluir</button>
      <button onclick="closeModal()" style="padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:#06091a;color:var(--text-muted);font-size:13px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif">Cancelar</button>
    </div>`;
}

function saveEditRecurring(index) {
  if(!state.recurring||!state.recurring[index]) return;
  const r = state.recurring[index];
  r.program = document.getElementById('f-rec-program').value;
  r.day = parseInt(document.getElementById('f-rec-day').value)||15;
  r.miles = parseInt(document.getElementById('f-rec-miles').value)||r.miles;
  r.cost = parseFloat(document.getElementById('f-rec-cost').value)||0;
  r.description = document.getElementById('f-rec-desc').value||r.description;
  r.active = document.getElementById('f-rec-active').value==='1';
  saveState(); closeModal(); render();
}

function deleteRecurring(index) {
  if(!confirm('Excluir este lançamento recorrente?')) return;
  if(!state.recurring) return;
  state.recurring.splice(index,1);
  saveState(); render();
}

function processRecurringTransactions() {
  if(!state.recurring||state.recurring.length===0) return;

  const now = new Date();
  let count = 0;

  state.recurring.forEach(r => {
    if(!r.active) return;

    const startDate = r.startDate ? new Date(r.startDate+'T00:00:00') : new Date('2025-01-01');

    // Process all months from start (or last processed) to now
    let checkDate = new Date(startDate);
    if(r.lastProcessed) {
      checkDate = new Date(r.lastProcessed+'T00:00:00');
      checkDate.setMonth(checkDate.getMonth()+1);
    }
    checkDate.setDate(r.day);

    while(checkDate <= now) {
      const dateStr = checkDate.toISOString().split('T')[0];

      // Check if already exists
      const exists = state.transactions.some(t =>
        t.program===r.program &&
        t.date===dateStr &&
        t.miles===r.miles &&
        t.isRecurring===true
      );

      if(!exists) {
        state.transactions.push({
          id: Date.now() + Math.round(Math.random()*1000000),
          date: dateStr,
          program: r.program,
          type: 'compra',
          miles: r.miles,
          cost: r.cost,
          savedValue: 0,
          description: `🔄 ${r.description}`,
          costPerK: r.miles>0&&r.cost>0?(r.cost/r.miles)*1000:0,
          isRecurring: true,
        });
        state.balances[r.program] = (state.balances[r.program]||0) + r.miles;
        count++;
      }

      r.lastProcessed = dateStr;
      checkDate.setMonth(checkDate.getMonth()+1);
      checkDate.setDate(r.day);
    }
  });

  if(count>0) {
    state.transactions.sort((a,b)=>new Date(b.date)-new Date(a.date));
    saveState();
    console.log(`🔄 ${count} lançamentos recorrentes processados.`);
  }
}

async function showPromoAlert() {
  const overlay = document.getElementById('promo-alert-overlay');
  const card = document.getElementById('promo-alert-card');
  if(!overlay||!card) return;

  // Only show once per session
  if(window._promoAlertShown) return;
  window._promoAlertShown = true;

  // Fallback - generic tips (no expiring promos)
  const fallbackPromos = [
    { title:'Smiles e C6 Bank: ganhe até 70% de bônus na transferência de Átomos para Smiles', link:'https://www.smiles.com.br/transferencia-pontos', source:'Smiles', sourceColor:'#ff6600', bonus:'70%', date: new Date().toLocaleDateString('pt-BR'), isHot:true, isPriority:true },
    { title:'LATAM Pass oferece 30% de milhas extras na transferência de pontos do cartão', link:'https://latampass.latam.com/pt_br/', source:'LATAM Pass', sourceColor:'#ED1C24', bonus:'30%', date: new Date().toLocaleDateString('pt-BR'), isHot:false, isPriority:false },
    { title:'Confira as transferências bonificadas ativas nos programas de fidelidade', link:'https://www.comparemania.com.br/promocoes-bonificadas', source:'Comparemania', sourceColor:'#10b981', bonus:'', date: new Date().toLocaleDateString('pt-BR'), isHot:false, isPriority:false },
  ];

  const now = new Date();
  const sevenDaysAgo = new Date(now.getTime() - 7*24*60*60*1000);

  let promos = [];
  try {
    const feeds = [
      { url:'https://www.melhoresdestinos.com.br/feed', source:'Melhores Destinos', color:'#ff6b35', priority:true },
      { url:'https://pontospravoar.com/feed/', source:'Pontos pra Voar', color:'#f59e0b', priority:false },
      { url:'https://www.melhorescartoes.com.br/c/promocoes-milhas/feed/', source:'Melhores Cartões', color:'#3b82f6', priority:false },
      { url:'https://passageirodeprimeira.com/feed/', source:'Passageiro de Primeira', color:'#ef4444', priority:false },
    ];
    for(const feed of feeds) {
      try {
        const resp = await fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(feed.url)+'&count=8',{signal:AbortSignal.timeout(5000)});
        if(resp.ok) {
          const data = await resp.json();
          if(data.items) data.items.forEach(item => {
            // Filter: only posts from last 7 days
            const pubDate = item.pubDate ? new Date(item.pubDate) : null;
            if(pubDate && pubDate < sevenDaysAgo) return;

            // Filter: skip posts with "vencido", "encerrada", "expirou", "acabou"
            const t = (item.title||'').toLowerCase();
            if(t.includes('vencid')||t.includes('encerrad')||t.includes('expirou')||t.includes('acabou')||t.includes('encerrou')) return;

            if(t.includes('bônus')||t.includes('bonus')||t.includes('bonificad')||t.includes('desconto')||t.includes('imperdível')||t.includes('último dia')||t.includes('milha')||t.includes('ponto')||t.includes('transf')||t.includes('smiles')||t.includes('livelo')||t.includes('latam')||t.includes('azul')||t.includes('esfera')||t.includes('clube')) {
              const bonus = (item.title||'').match(/(\d+[\.,]?\d*)\s*%/);
              promos.push({
                title: item.title,
                link: item.link,
                source: feed.source,
                sourceColor: feed.color,
                bonus: bonus?bonus[0]:'',
                pubDate: pubDate,
                date: pubDate?pubDate.toLocaleDateString('pt-BR'):'',
                isHot: t.includes('imperdível')||t.includes('último dia')||(bonus&&parseInt(bonus[1])>=70),
                isPriority: feed.priority||false,
              });
            }
          });
        }
      } catch(e) {}
    }
  } catch(e) {}

  // Use fallback if no live promos found
  if(promos.length===0) promos = fallbackPromos;

  // Sort: Melhores Destinos first, then hottest, then most recent
  promos.sort((a,b)=>{
    if(a.isPriority!==b.isPriority) return (b.isPriority?1:0)-(a.isPriority?1:0);
    if(b.isHot!==a.isHot) return (b.isHot?1:0)-(a.isHot?1:0);
    if(a.pubDate&&b.pubDate) return b.pubDate-a.pubDate;
    return 0;
  });
  promos = promos.slice(0,3);

  const top = promos[0];
  const others = promos.slice(1);

  card.innerHTML = `
    <div style="background:linear-gradient(135deg,#f5c518,#ff9800);padding:16px 20px;position:relative;overflow:hidden">
      <div style="position:absolute;top:-20px;right:-20px;font-size:80px;opacity:0.15;transform:rotate(15deg)">✈</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:11px;font-weight:700;color:#0a3558;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">🔥 Promoção em Destaque</div>
          <div style="font-size:9px;color:#0a355899">${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}</div>
        </div>
        <button data-close-promo style="background:rgba(0,0,0,0.2);border:none;color:#0a3558;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;font-weight:700;z-index:10">✕</button>
      </div>
    </div>

    <div style="padding:20px">
      <a href="${top.link}" target="_blank" rel="noopener" style="text-decoration:none;display:block;margin-bottom:16px">
        <div style="font-size:15px;font-weight:800;color:#eef0f6;line-height:1.4;margin-bottom:8px">${top.title}</div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          ${top.bonus?`<span style="background:#22c99722;color:#22c997;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700;border:1px solid #22c99744">${top.bonus} de bônus</span>`:''}
          ${top.isHot?'<span style="font-size:11px">🔥 Imperdível</span>':''}
          <span style="font-size:10px;color:#556177">via ${top.source} · ${top.date}</span>
        </div>
      </a>

      ${others.length>0?`
      <div style="border-top:1px solid rgba(255,255,255,0.06);padding-top:12px;margin-bottom:16px">
        <div style="font-size:9px;color:#556177;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Também em alta</div>
        ${others.map(p=>`
          <a href="${p.link}" target="_blank" rel="noopener" style="text-decoration:none;display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03)">
            <div style="width:6px;height:6px;border-radius:50%;background:${p.sourceColor};flex-shrink:0"></div>
            <div style="flex:1;min-width:0">
              <div style="font-size:11px;color:#9ba4b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.title}</div>
              <div style="font-size:9px;color:#3a4558;margin-top:2px">${p.source} ${p.bonus?'· '+p.bonus:''}</div>
            </div>
            <span style="color:#556177;font-size:12px;flex-shrink:0">→</span>
          </a>
        `).join('')}
      </div>`:''}

      <div style="display:flex;gap:8px">
        <a href="${top.link}" target="_blank" rel="noopener" style="flex:1;display:block;padding:12px;border-radius:14px;background:linear-gradient(145deg,#f5c518,#d4a910);color:#0a3558;font-size:13px;font-weight:700;text-align:center;text-decoration:none;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 3px 12px rgba(245,197,24,0.3)">Ver Promoção</a>
        <button data-close-promo style="padding:12px 18px;border-radius:14px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#556177;font-size:12px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif">Fechar</button>
      </div>
    </div>`;

  overlay.style.display = 'flex';

  // Use event delegation on overlay for ALL close actions
  overlay.addEventListener('click', function(e) {
    // Close if clicked on overlay background (outside card)
    if(e.target === overlay) { overlay.style.display = 'none'; return; }
    // Close if clicked on a close button inside the card
    const btn = e.target.closest('[data-close-promo]');
    if(btn) { e.preventDefault(); overlay.style.display = 'none'; }
  });
}

  const overlay = document.getElementById('promo-alert-overlay');
  if(overlay) overlay.style.display = 'none';

function applyUserTheme(user) {
  const header = document.querySelector('.header');
  const headerInfo = document.getElementById('header-user-info');

  if(user && user.email === ADMIN_EMAIL) {
    // ADMIN THEME — Gold/Premium
    header.style.background = 'linear-gradient(180deg, #1a0f00, #2d1a00)';
    header.style.borderBottom = '2px solid #f5c518';
    header.style.boxShadow = '0 4px 30px rgba(245,197,24,0.15), inset 0 1px 0 rgba(245,197,24,0.1)';

    headerInfo.innerHTML = `<span style="display:inline-flex;align-items:center;gap:6px">
      <span style="background:linear-gradient(135deg,#f5c518,#d4a910);color:#0a3558;padding:2px 10px;border-radius:50px;font-size:9px;font-weight:800;letter-spacing:0.5px;box-shadow:0 2px 8px rgba(245,197,24,0.3)">👑 ADMIN</span>
      <span style="color:#f5c518;font-size:10px;font-weight:600">${user.email}</span>
    </span>`;

    // Add gold glow to body
    document.body.style.setProperty('--admin-glow', '1');
    const adminStyle = document.createElement('style');
    adminStyle.id = 'admin-theme-style';
    adminStyle.textContent = `
      .header { backdrop-filter: blur(30px) saturate(200%) !important; }
      .tab.active { background: linear-gradient(145deg, #f5c518, #d4a910) !important; color: #0a3558 !important; box-shadow: 0 3px 15px rgba(245,197,24,0.4) !important; }
      body::before { background:
        radial-gradient(ellipse 80% 60% at 10% 20%, rgba(245,197,24,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 90% 80%, rgba(245,197,24,0.05) 0%, transparent 50%),
        radial-gradient(ellipse 50% 50% at 50% 0%, rgba(26,15,0,0.4) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 80% 20%, rgba(245,197,24,0.03) 0%, transparent 50%) !important; }

function initApp() {
  const APP_VERSION = 'v5.0-auth';
  if(localStorage.getItem('miles-control-version') !== APP_VERSION) {
    if(!state.recurring) state.recurring = [];
    localStorage.setItem('miles-control-version', APP_VERSION);
    saveState();
  }
  processRecurringTransactions();
  renderTabs();
  render();
  maybeAutoFetchEuro();
  // Show promo alert after a short delay
  setTimeout(showPromoAlert, 1500);
}

if(useFirebase) {
  // Hide app until auth
  document.querySelector('.header').style.display='none';
 document.getElementById('main-content').style.display='none';

  firebase.auth().onAuthStateChanged(async(user)=>{
    currentUser=user;
    const authScreen=document.getElementById('auth-screen');
    if(user){
      document.getElementById('auth-loading').style.display='block';
      document.getElementById('auth-form').style.display='none';
      const loaded=await loadFromCloud();
      if(!loaded) state=defaultState();
      authScreen.style.display='none';
      document.querySelector('.header').style.display='';
     document.getElementById('main-content').style.display='';
      applyUserTheme(user);
      initApp();
    } else {
      authScreen.style.display='flex';
      document.querySelector('.header').style.display='none';
      document.getElementById('main-content').style.display='none';
      document.getElementById('auth-form').style.display='block';
      document.getElementById('auth-loading').style.display='none';
    }
  });
} else {
  // No Firebase — auto offline
  document.getElementById('auth-screen').style.display='flex';
}
